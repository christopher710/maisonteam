<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--bdr:rgba(255,255,255,.06);--t1:#e6edf3;--t2:#9ca8b8;--t3:#5a6577;
--cc:#4d96ff;--cs:#ff85a1;--cn:#a66cff;--cm:#ff9f43;--ca:#00d2d3;--cse:#6bcb77;--cl:#ffd93d;--cp:#ff6b6b;
--grn:#2ea043;--red:#f85149;--blu:#4d96ff;--ylw:#ffd93d;--r:14px;--rs:10px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Quicksand',sans-serif;background:var(--bg);color:var(--t1);min-height:100dvh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 5%,rgba(77,150,255,.06),transparent 50%),radial-gradient(ellipse at 85% 95%,rgba(255,133,161,.04),transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:500px;margin:0 auto;padding-bottom:85px}
.hdr{padding:16px 16px 8px}.hdr h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.6rem;background:linear-gradient(135deg,var(--ylw),var(--red),var(--cs));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{color:var(--t2);font-size:.78rem;margin-top:1px}.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle}.dot.on{background:var(--grn);box-shadow:0 0 5px var(--grn)}.dot.off{background:var(--red)}
.dbar{margin-top:10px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.dbar .dn{font-family:'Nunito',sans-serif;font-weight:800;font-size:1.05rem}.dbar .dd{color:var(--t2);font-size:.75rem}
.wn{display:flex;gap:5px}.wn button{background:var(--bg3);border:1px solid var(--bdr);color:var(--t1);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center}
.week{display:flex;gap:3px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}.week::-webkit-scrollbar{display:none}
.dc{flex-shrink:0;text-align:center;padding:7px 12px;border-radius:var(--rs);cursor:pointer;background:var(--bg2);border:1px solid transparent;min-width:50px;transition:all .2s}
.dc .dn2{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:.8px}.dc .num{font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;margin-top:1px}
.dc.act{background:linear-gradient(135deg,var(--blu),#a66cff);transform:scale(1.06);box-shadow:0 3px 14px rgba(77,150,255,.25)}.dc.act .dn2{color:#fff}
.dc.tod:not(.act){border-color:var(--ylw)}.dc.has::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--grn);margin:3px auto 0}.dc.act.has::after{background:#fff}
.tabs{display:flex;gap:4px;padding:4px 16px;margin-bottom:4px}.tab{flex:1;text-align:center;padding:8px 4px;border-radius:var(--rs);font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;background:var(--bg2);border:1px solid var(--bdr);color:var(--t3);transition:all .2s}.tab.act{background:var(--blu);color:#fff;border-color:var(--blu)}
.pbar{margin:8px 16px;height:6px;background:var(--bg3);border-radius:8px;overflow:hidden}.pfill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--grn),var(--ylw));transition:width .5s}
.ptxt{padding:0 16px;font-size:.68rem;color:var(--t3);display:flex;justify-content:space-between;margin-bottom:6px}
.who{padding:6px 16px 8px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}.who::-webkit-scrollbar{display:none}
.wc{flex-shrink:0;text-align:center;cursor:pointer}.wc.act .av{box-shadow:0 0 0 2.5px var(--blu)}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;color:#fff;margin-bottom:3px;position:relative}
.av .cnt{position:absolute;top:-2px;right:-2px;background:var(--red);font-size:.5rem;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--bg)}
.wc .nm{font-size:.55rem;color:var(--t2);font-weight:600;max-width:48px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sec{padding:0 16px;margin-top:10px}.sec-t{font-family:'Nunito',sans-serif;font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.badge{background:var(--blu);color:#fff;font-size:.6rem;padding:1px 7px;border-radius:12px;font-weight:600}
.task{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;cursor:pointer;transition:all .15s}
.task:active{transform:scale(.98)}.task.done{opacity:.4}.task.done .tn{text-decoration:line-through}
.task .bar{position:absolute;left:0;top:0;bottom:0;width:3.5px;border-radius:3px 0 0 3px}
.task .ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.task .ti{flex:1;min-width:0}.tn{font-weight:700;font-size:.82rem;margin-bottom:1px}.tm{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tp{font-size:.65rem;padding:1.5px 7px;border-radius:12px;font-weight:600;color:#fff}.tt{font-size:.65rem;color:var(--t3)}
.imp{font-size:.58rem;padding:1px 6px;border-radius:8px;background:rgba(248,81,73,.15);color:var(--red);font-weight:700;border:1px solid rgba(248,81,73,.2)}
.lib{font-size:.58rem;padding:1px 6px;border-radius:8px;background:rgba(46,160,67,.12);color:var(--grn);font-weight:700;border:1px solid rgba(46,160,67,.2)}
.don{font-size:.6rem;color:var(--grn);font-weight:600}
.rtn{font-size:.58rem;padding:1px 6px;border-radius:8px;background:rgba(156,168,184,.1);color:var(--t3);font-weight:600;border:1px solid rgba(156,168,184,.15)}
.urg-banner{background:rgba(248,81,73,.15);border:1px solid rgba(248,81,73,.4);border-radius:var(--r);padding:12px 14px;margin:8px 0;animation:urgPulse 1.5s ease-in-out infinite}
@keyframes urgPulse{0%,100%{opacity:1}50%{opacity:.6}}
.urg-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:.55rem;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;animation:urgBlink .8s infinite}
@keyframes urgBlink{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.urg-tag{background:var(--red);color:#fff;font-size:.55rem;padding:1px 6px;border-radius:6px;animation:urgBlink .8s infinite;display:inline-block}
.chk{width:26px;height:26px;border-radius:50%;border:2px solid var(--t3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.8rem;transition:all .2s}.chk.on{border-color:var(--grn);background:var(--grn);color:#fff}
.empty{text-align:center;padding:30px 16px;color:var(--t3)}.empty .ei{font-size:2.5rem;margin-bottom:8px}

  // Matin école only
  PERSO_MATIN_ECOLE.forEach(t=>tasks.push({n:t.n,i:t.i,m:'matin',when:'ecole'}));
  // Soir base
  PERSO_SOIR_BASE.forEach(t=>{if(t.c!=='medicament')tasks.push({n:t.n,i:t.i,m:'soir',when:'always'})});

  PERSO_SOIR_ECOLE.forEach(t=>tasks.push({n:t.n,i:t.i,m:'soir',when:'ecole'}));
  // Mercredi AM
  PERSO_MERCREDI_AM.forEach(t=>tasks.push({n:t.n,i:t.i,m:'apresmidi',when:'mercredi'}));
}
if(member.r==='grand'){
  // Grands: pas de tâches perso quotidiennes sauf médicaments
}
// Médicaments are now managed in S.meds section, not in person model
// Vendredi: trier bac (tous les 8)
tasks.push({n:'Trier son bac de vêtements',i:'👕',m:'soir',when:'vendredi'});

return tasks;

function dk(d){if(typeof d==='string')return d;return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}

function wd(c){const d=new Date(c),dy=d.getDay(),m=new Date(d);m.setDate(d.getDate()-((dy+6)%7));return Array.from({length:7},(_,i)=>{const x=new Date(m);x.setDate(m.getDate()+i);return x})}
function dayType(d){const day=(typeof d==='string'?new Date(d+'T12:00:00'):d).getDay();if(day===0||day===6)return'weekend';if(day===3)return'mercredi';return'normal'}

function applyRecurring(date){
const d=dk(date);const day=date.getDay();
const existing=tfd(date);
let added=false;
Object.values(S.recurring).forEach(r=>{
  if(!r.days||!r.days.includes(day))return;
  const assignees=r.assignees&&r.assignees.length>0?r.assignees:[r.assignee].filter(Boolean);
  if(assignees.length===0){
    // Libre task
    const already=existing.find(t=>t.recId===r.id);
    if(already)return;
    const id=uid();
    S.tasks[id]={id,name:r.name,category:r.category,icon:r.icon||'✨',type:'libre',assignee:null,date:d,moment:r.moment,done:false,doneBy:null,routine:r.routine||false,order:9000,recId:r.id};
    added=true;
  } else {
    // One task per assignee
    assignees.forEach(p=>{
      const already=existing.find(t=>t.recId===r.id&&t.assignee===p);
      if(already)return;
      const id=uid();
      S.tasks[id]={id,name:r.name,category:r.category,icon:r.icon||'✨',type:'impose',assignee:p,date:d,moment:r.moment,done:false,doneBy:null,routine:r.routine||false,order:9000,recId:r.id};
      added=true;
    });
  }
});
if(added){pshAll()}
}

function dedupDay(date){
const d=dk(date);
const day=date.getDay();
const dayTasks=Object.values(S.tasks).filter(t=>t.date===d);
const seen={};
let removed=false;

dayTasks.forEach(t=>{
  // Remove tasks that should only appear on specific days
  const isFri=day===5,isSun=day===0;
  if(t.name==='Trier son bac de vêtements'&&!isFri){delete S.tasks[t.id];removed=true;return}
  if(t.name==='Trier son bac à vêtements'&&!isFri){delete S.tasks[t.id];removed=true;return}
  if(t.name==='Essuies et gants de toilette au linge'&&!isSun){delete S.tasks[t.id];removed=true;return}
  if(t.name==='Essuies et gants au linge'&&!isSun){delete S.tasks[t.id];removed=true;return}

  // Remove excluded tasks
  if(isExcluded(t.name,t.moment,t.assignee)){delete S.tasks[t.id];removed=true;return}

  // Dedup
  const key=t.name+'|'+(t.assignee||'')+'|'+t.moment;
  if(seen[key]){
    if(!t.done){delete S.tasks[t.id];removed=true}
    else if(!seen[key].done){delete S.tasks[seen[key].id];seen[key]=t;removed=true}
    else{delete S.tasks[t.id];removed=true}
  } else {seen[key]=t}
});
if(removed)pshAll();
}

function renderTasks(list){

const ma=(momentOrder[a.moment]||9),mb=(momentOrder[b.moment]||9);
if(ma!==mb)return ma-mb;
return(a.order||0)-(b.order||0);
});
let html='',lastMoment='';
sorted.forEach((t,i)=>{
const mom=MOMENTS.find(m=>m.id===t.moment);
if(t.moment!==lastMoment&&mom){
lastMoment=t.moment;
html+=`<div class="moment-hdr" style="background:${mom.bg}">${mom.icon} ${mom.name}</div>`}

if(t.category==='medicament'&&t.medIds&&t.medIds.length>0){

})()}</div>

const week=wd(S.sel);let wt=[];week.forEach(d=>wt.push(...tfd(d).filter(t=>!t.routine)));
const selM=S.sel.getMonth(),selY=S.sel.getFullYear();
const allM=Object.values(S.tasks).filter(t=>{if(t.routine)return false;const td=new Date(t.date+'T12:00:00');return td.getMonth()===selM&&td.getFullYear()===selY});
function cP(tasks,n){return tasks.filter(t=>t.doneBy===n&&t.type==='libre').reduce((s,t)=>s+(t.pts||1),0)}
const isP=isParent(S.who);
const tab=window._statTab||'week';
const wMs=F.map(m=>{const d=wt.filter(x=>x.doneBy===m.n).length;return{...m,done:d,pts:cP(wt,m.n)}}).sort((x,y)=>y.pts-x.pts);
const mMs=F.map(m=>{const d=allM.filter(x=>x.doneBy===m.n).length;return{...m,done:d,pts:cP(allM,m.n)}}).sort((x,y)=>y.pts-x.pts);
const ms=tab==='month'?mMs:wMs;
const ttl=tab==='month'?MFR[selM]+' '+selY:'Semaine en cours';
let h='<div class="hdr"><h1>📊 Statistiques</h1><div class="sub">'+ttl+'</div></div>';
h+='<div style="display:flex;gap:6px;padding:0 16px 12px">';
h+='<div class="ci '+(tab==='week'?'sel':'')+'" onclick="window._statTab=\'week\';render()" style="flex:1;text-align:center;padding:8px">📅 Semaine</div>';
h+='<div class="ci '+(tab==='month'?'sel':'')+'" onclick="window._statTab=\'month\';render()" style="flex:1;text-align:center;padding:8px">📆 Mois</div></div>';
h+='<div class="sec"><div class="sec-t">🏆 Classement ⭐ Points</div>';
ms.forEach((m,i)=>{
  const medal=i<3?['🥇','🥈','🥉'][i]:''+(i+1);
  const pct=ms[0].pts>0?(m.pts/ms[0].pts*100):0;
  h+='<div class="lb fin" style="animation-delay:'+i*.05+'s">';
  h+='<div class="lr">'+medal+'</div>';
  h+='<div class="av" style="background:var('+m.c+');width:36px;height:36px;font-size:.85rem">'+ini(m.n)+'</div>';
  h+='<div style="flex:1"><div style="font-weight:700;font-size:.85rem">'+m.n+' <span style="color:#f1c40f;font-size:.75rem">⭐'+m.pts+'</span></div>';
  h+='<div style="font-size:.7rem;color:var(--t3)">'+m.done+' tâches • '+m.pts+' points</div>';
  h+='<div class="pbar" style="margin:4px 0 0;height:5px"><div class="pfill" style="width:'+pct+'%;background:var('+m.c+')"></div></div></div></div>';
});
h+='</div>';
if(isP){
  h+='<div class="sec"><div class="sec-t">🔧 Gestion</div>';
  h+='<div class="sc" onclick="resetStats()"><div class="si">🗑️</div><div class="sf"><div class="st" style="color:var(--red)">Remettre les stats à zéro</div>';
  h+='<div class="sd">Efface les points du '+(tab==='month'?'mois':'de la semaine')+'</div></div></div></div>';
}
h+='<div class="nav"><div class="ni" onclick="nv(\'home\')"><span class="ic">🏠</span>Accueil</div>';
h+='<div class="ni act" onclick="nv(\'stats\')"><span class="ic">📊</span>Stats</div>';

else h+='<div class="ni" onclick="askSwitch()"><span class="ic">👤</span>Profil</div>';
h+='</div>';
a.innerHTML=h}

window.resetStats=function(){
const tab=window._statTab||'week';
if(!confirm('Remettre à zéro les stats '+(tab==='month'?'du mois':'de la semaine')+' ?'))return;
const selM=S.sel.getMonth(),selY=S.sel.getFullYear();
const weekDates=wd(S.sel).map(d=>dk(d));
Object.values(S.tasks).forEach(t=>{
  if(t.routine||!t.done)return;
  if(tab==='month'){const td=new Date(t.date+'T12:00:00');if(td.getMonth()===selM&&td.getFullYear()===selY){t.done=false;t.doneBy=null;psh(t.id,t)}}
  else{if(weekDates.includes(t.date)){t.done=false;t.doneBy=null;psh(t.id,t)}}
});
toast('🗑️ Stats remises à zéro');render()}

// PER-PERSON MODEL EDITOR
const WHEN_LABELS={always:'Tous les jours',ecole:'Jours d\'école','1,2,3,4,5':'Lun-Ven','1,2,4,5':'Lun,Mar,Jeu,Ven','5':'Vendredi','0':'Dimanche','6':'Samedi','0,6':'Weekend'};
function whenLabel(t){
if(t.when==='always')return'📅 Tous les jours';
if(t.when==='ecole')return'🏫 Jours d\'école';
if(t.when==='mercredi')return'📅 Mercredi';
if(t.when==='vendredi')return'📅 Vendredi';
if(t.when==='samedi')return'📅 Samedi';
if(t.when==='dimanche')return'📅 Dimanche';
if(t.days&&t.days.length>0){
  const dn=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  return'📅 '+t.days.map(d=>dn[d]).join(', ');
}
return WHEN_LABELS[t.when]||t.when;
}

window.openPersonModel=function(name){

const member=F.find(m=>m.n===name);
if(!member)return;
const tasks=S.model[name]||[];

// Group by moment
const momOrder=['matin','midi','apresmidi','soir','libre'];
momOrder.forEach(momId=>{
  const momTasks=tasks.filter(t=>t.m===momId);
  if(momTasks.length===0)return;

  if(mom)html+='<div class="moment-hdr" style="background:'+mom.bg+'">'+mom.icon+' '+mom.name+'</div>';

window.doAddModelTask=function(name){
const n=document.getElementById('mtN').value.trim();
if(!n){toast('⚠️ Donnez un nom');return}
const i=document.getElementById('mtI').value.trim()||'✨';
if(!window._mtEcole&&window._mtDays.length===0){toast('⚠️ Choisissez quand');return}
const task={n:n,i:i,m:window._mtMom};
if(window._mtEcole){task.when='ecole'}
else if(window._mtDays.length===7){task.when='always';task.days=[0,1,2,3,4,5,6]}
else{task.when='days';task.days=window._mtDays.sort()}
if(!S.model[name])S.model[name]=[];
S.model[name].push(task);
pushModel();
// Auto-inject into already generated days (today + future)
injectModelTask(name,task);
toast('✅ Tâche ajoutée (aussi ajoutée aux jours existants)');
openPersonModel(name)};

function injectModelTask(name,task){
// Find all dates that have tasks for this person
const today=new Date();
const todayStr=dk(today);
const existingDates=new Set();
Object.values(S.tasks).forEach(t=>{
  if(t.assignee===name&&t.date>=todayStr)existingDates.add(t.date);
});
// Also add today if it has any tasks at all
if(tfd(today).length>0)existingDates.add(todayStr);

existingDates.forEach(dateStr=>{
  const dt=new Date(dateStr+'T12:00:00');
  const day=dt.getDay();
  const isWE=day===0||day===6;
  const isMer=day===3;
  // Check if task should appear on this day
  let shouldAdd=false;
  if(task.when==='always')shouldAdd=true;
  else if(task.when==='ecole'&&!isWE)shouldAdd=true;
  else if(task.when==='days'&&task.days&&task.days.includes(day))shouldAdd=true;
  else if(task.when==='mercredi'&&isMer&&!isWE)shouldAdd=true;
  
  if(!shouldAdd)return;
  
  const mom=task.m||'matin';
  // Check dedup
  const exists=Object.values(S.tasks).find(t=>t.date===dateStr&&t.name===task.n&&t.assignee===name&&t.moment===mom);
  if(exists)return;
  
  const id=uid();
  S.tasks[id]={id,name:task.n,category:'perso',icon:task.i||'✨',type:'impose',assignee:name,date:dateStr,moment:mom,done:false,doneBy:null,routine:true,order:9999};
  psh(id,S.tasks[id]);
});
}

let _alertPlayed={};
function playAlertSound(){
try{
const ctx=new(window.AudioContext||window.webkitAudioContext)();
const play=(f,t,d)=>{const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.01,t+d);o.start(t);o.stop(t+d)};
play(880,ctx.currentTime,0.15);play(1100,ctx.currentTime+0.15,0.15);play(1320,ctx.currentTime+0.3,0.3);
}catch(e){}}

window.togMedTaken=function(taskId,medId){
const t=S.tasks[taskId];if(!t)return;
if(!t.medsTaken)t.medsTaken=[];

if(idx>=0){
  // Untake — restore stock
  t.medsTaken.splice(idx,1);
  const m=S.meds[medId];
  if(m&&m.stock!==undefined){m.stock++;pushMeds()}
  t.done=false;t.doneBy=null;
} else {
  // Take — decrease stock
  t.medsTaken.push(medId);
  const m=S.meds[medId];
  if(m&&m.stock!==undefined&&m.stock>0){
    m.stock--;
    pushMeds();

      checkMedAlerts();
      toast('⚠️ Stock bas: '+m.name+' ('+m.stock+')');
    }
  }
  // Check if all meds taken → mark task done
  if(t.medIds&&t.medIds.every(mid=>t.medsTaken.includes(mid))){
    t.done=true;t.doneBy=t.assignee||S.who;
  }
}
psh(taskId,t);
// Re-open the modal to refresh
openD(taskId);
render()};

let _taskOrder=0;
function isExcluded(name,moment,assignee){
const key=name+'|'+(moment||'')+'|'+(assignee||'');
const keyGeneric=name+'|'+(moment||'')+'|';
return S.excluded[key]||S.excluded[keyGeneric];
}

function addTask(d,tpl,type,assignee,moment,routine){
const mom=moment||tpl.m||'libre';
// Check exclusion
if(isExcluded(tpl.n,mom,assignee))return;
// Dedup: skip if same name+assignee+moment+date already exists
const exists=Object.values(S.tasks).find(t=>t.date===d&&t.name===tpl.n&&t.assignee===assignee&&t.moment===mom);
if(exists)return;
const id=uid();const cat=CATS.find(c=>c.id===tpl.c);
const task={id,name:tpl.n,category:tpl.c,icon:tpl.i||cat?.icon||'✨',type,assignee,date:d,moment:mom,done:false,doneBy:null,routine:routine||false,order:_taskOrder++};
if(tpl.pts)task.pts=tpl.pts;
S.tasks[id]=task}

function addMeds(d,person,moment,routine){
const personMeds=getPersonMeds(person).filter(m=>m.moments&&m.moments.includes(moment));
// Only create task if there are meds configured in S.meds for this person+moment
if(personMeds.length===0)return;
const mom=moment||'libre';
const taskName='💊 Médicaments';
const exists=Object.values(S.tasks).find(t=>t.date===d&&t.name===taskName&&t.assignee===person&&t.moment===mom);
if(exists)return;
if(isExcluded(taskName,mom,person))return;
const id=uid();
const medIds=personMeds.map(m=>m.id);
S.tasks[id]={id,name:taskName,category:'medicament',icon:'💊',type:'impose',assignee:person,date:d,moment:mom,done:false,doneBy:null,routine:routine||false,order:_taskOrder++,medIds:medIds,medsTaken:[]};
}

// Helper: build petits matin tasks in correct order with/without école
function buildPetitsMatin(ecole){
const list=[...PERSO_MATIN_BASE];
if(ecole){
  // Insert mallette after "Ranger son pyjama" (index 2 in base)
  const idx=list.findIndex(t=>t.n==='Ranger son pyjama');
  list.splice(idx+1,0,...PERSO_MATIN_ECOLE.map(t=>({n:t.n,c:t.c,i:t.i})));
}
return list;
}

// Helper: build petits soir tasks in correct order with/without école
function buildPetitsSoir(ecole){
const list=[...PERSO_SOIR_BASE];
if(ecole){
  // Insert devoirs+mallette after "Prendre son 4h" (index 0 in base)
  const idx=list.findIndex(t=>t.n==='Prendre son 4h');
  list.splice(idx+1,0,...PERSO_SOIR_ECOLE.map(t=>({n:t.n,c:t.c,i:t.i})));
}
return list;
}

function generateDay(date,forceNoSchool){
_taskOrder=0;
const d=dk(date),dt=dayType(date),day=date.getDay(),wk=weekNum(date);
const isSat=day===6,isSun=day===0,isWE=isSat||isSun;
const isMer=day===3;
// École: lun,mar,mer(matin),jeu,ven = true. Weekend = false. Vacances = forcé false
const ecole=forceNoSchool?false:!isWE;

// === TACHES OBLIGATOIRES — from S.model per person ===
F.forEach(fm=>{
  const p=fm.n;
  const tasks=S.model[p]||[];
  tasks.forEach(t=>{
    if(t.when==='ecole'&&!ecole)return;
    if(t.when==='mercredi'&&(!isMer||!ecole))return;
    if(t.when==='vendredi'&&day!==5)return;
    if(t.when==='dimanche'&&day!==0)return;
    if(t.when==='samedi'&&day!==6)return;
    if(t.when==='days'&&t.days&&!t.days.includes(day))return;
    const mom=t.m||'matin';
    addTask(d,{n:t.n,c:'perso',i:t.i},'impose',p,mom,true);
  });
});

// === MEDICAMENTS — all family members from S.meds ===
F.forEach(m=>{
  ['matin','midi','soir'].forEach(mom=>addMeds(d,m.n,mom,true));
});

// === TACHES LIBRES (from modelLibre) ===
(S.modelLibre||[]).forEach(t=>{
  if(t.days&&t.days.includes(day)){
    addTask(d,{n:t.n,c:'menage',i:t.i,pts:t.pts||1},'libre',null,t.m||'libre');
  }
});

// === ROTATIONS (configurable) ===
(S.rotations||[]).forEach(rot=>{
  const day2=date.getDay();
  if(!rot.days||!rot.days.includes(day2))return;
  const person=getRotationPerson(rot,date);
  addTask(d,{n:rot.name,c:'menage',i:rot.icon||'🧹'},'impose',person,rot.moment||'samedi');
});

// === SAMEDI LIBRE ===
if(isSat){
  SAMEDI_LIBRE.forEach(t=>addTask(d,t,'libre',null,'samedi'));
}

// === DIMANCHE: draps 1 sem/2 ===
if(isSun&&wk%2===0){
  ENFANTS.forEach(p=>addTask(d,T_DRAPS,'impose',p,'libre'));
}

// === VENDREDI: trier bac vêtements (tous, routine) ===
if(day===5){
  TOUS.forEach(p=>addTask(d,T_TRIER_BAC,'impose',p,'soir',true));
}

// === DIMANCHE: essuies et gants au linge (tous, routine) ===
if(isSun){
  TOUS.forEach(p=>addTask(d,T_ESSUIES,'impose',p,'libre',true));
}

// === RECURRING TASKS (custom) ===
Object.values(S.recurring).forEach(r=>{
  if(r.days&&r.days.includes(day)){
    const assignees=r.assignees&&r.assignees.length>0?r.assignees:[r.assignee].filter(Boolean);
    if(assignees.length===0){
      addTask(d,{n:r.name,c:r.category,i:r.icon},r.type||'libre',null,r.moment,r.routine||false);
    } else {
      assignees.forEach(p=>{
        addTask(d,{n:r.name,c:r.category,i:r.icon},'impose',p,r.moment,r.routine||false);
      });
    }
  }
});
}

// Modified generateDay that takes per-child school map
function generateDayPerChild(date,schoolMap){
_taskOrder=0;
// Save existing tasks before generation to know what's new
const beforeIds=new Set(Object.keys(S.tasks));
const d=dk(date),day=date.getDay(),wk=weekNum(date);
const isSat=day===6,isSun=day===0,isWE=isSat||isSun;
const isMer=day===3;

// === TACHES OBLIGATOIRES — from S.model per person ===
// Petits: use per-child school status from schoolMap
PETITS.forEach(p=>{
  const ecole=schoolMap[p]!==undefined?schoolMap[p]:defaultSchool(day);
  const tasks=S.model[p]||[];
  tasks.forEach(t=>{
    // Check when condition
    if(t.when==='ecole'&&!ecole)return;
    if(t.when==='mercredi'&&(!isMer||!ecole))return;
    if(t.when==='vendredi'&&day!==5)return;
    if(t.when==='dimanche'&&day!==0)return;
    if(t.when==='samedi'&&day!==6)return;
    if(t.when==='days'&&t.days&&!t.days.includes(day))return;
    const mom=t.m||'matin';
    addTask(d,{n:t.n,c:'perso',i:t.i},'impose',p,mom,true);
  });
});

// Grands + Parents: use global école (weekday=école, weekend=no)
const globEcole=!isWE;
[...GRANDS,'Christopher','Stéphanie'].forEach(p=>{
  const tasks=S.model[p]||[];
  tasks.forEach(t=>{
    if(t.when==='ecole'&&!globEcole)return;
    if(t.when==='mercredi'&&(!isMer||!globEcole))return;
    if(t.when==='vendredi'&&day!==5)return;
    if(t.when==='dimanche'&&day!==0)return;
    if(t.when==='samedi'&&day!==6)return;
    if(t.when==='days'&&t.days&&!t.days.includes(day))return;
    const mom=t.m||'matin';
    addTask(d,{n:t.n,c:'perso',i:t.i},'impose',p,mom,true);
  });
});

// === MEDICAMENTS — all family members from S.meds ===
F.forEach(m=>{
  ['matin','midi','soir'].forEach(mom=>addMeds(d,m.n,mom,true));
});

// === TACHES LIBRES (from modelLibre) ===
(S.modelLibre||[]).forEach(t=>{
  if(t.days&&t.days.includes(day)){
    addTask(d,{n:t.n,c:'menage',i:t.i,pts:t.pts||1},'libre',null,t.m||'libre');
  }
});

// === ROTATIONS (configurable) ===
(S.rotations||[]).forEach(rot=>{
  const day2=date.getDay();
  if(!rot.days||!rot.days.includes(day2))return;
  const person=getRotationPerson(rot,date);
  addTask(d,{n:rot.name,c:'menage',i:rot.icon||'🧹'},'impose',person,rot.moment||'samedi');
});

// === SAMEDI LIBRE ===
if(isSat){
  SAMEDI_LIBRE.forEach(t=>addTask(d,t,'libre',null,'samedi'));
}

// === DIMANCHE: draps 1 sem/2 ===
if(isSun&&wk%2===0){
  ENFANTS.forEach(p=>addTask(d,T_DRAPS,'impose',p,'libre'));
}

// === VENDREDI: trier bac (tous, routine) ===
if(day===5){
  TOUS.forEach(p=>addTask(d,T_TRIER_BAC,'impose',p,'soir',true));
}

// === DIMANCHE: essuies et gants (tous, routine) ===
if(isSun){
  TOUS.forEach(p=>addTask(d,T_ESSUIES,'impose',p,'libre',true));
}

// === RECURRING ===
Object.values(S.recurring).forEach(r=>{
  if(r.days&&r.days.includes(day)){
    const assignees=r.assignees&&r.assignees.length>0?r.assignees:[r.assignee].filter(Boolean);
    if(assignees.length===0){
      addTask(d,{n:r.name,c:r.category,i:r.icon},r.type||'libre',null,r.moment,r.routine||false);
    } else {
      assignees.forEach(p=>{
        addTask(d,{n:r.name,c:r.category,i:r.icon},'impose',p,r.moment,r.routine||false);
      });
    }
  }
});
}

window.doGenDay=function(){
const sel=window._genDays[0].date;
const existing=tfd(sel);
if(existing.length>0){
  const doneCount=existing.filter(t=>t.done).length;
  if(doneCount>0&&!confirm('⚠️ Il y a déjà '+existing.length+' tâches dont '+doneCount+' faites.\nLes tâches faites seront gardées.\nContinuer ?'))return;
}
const beforeIds=new Set(Object.keys(S.tasks));
const schoolMap={};
PETITS.forEach(p=>{schoolMap[p]=window._genSchool[p+'_0']});
generateDayPerChild(sel,schoolMap);
// Only push NEW tasks (not overwrite existing)
Object.keys(S.tasks).forEach(id=>{if(!beforeIds.has(id))psh(id,S.tasks[id])});
closeM();toast('✅ Jour généré !');render()};

window.doGenWeek=function(){
const week=window._genDays;
const beforeIds=new Set(Object.keys(S.tasks));
let n=0;
week.forEach((d,i)=>{
  if(window._genSkipDay[i])return;
  const schoolMap={};
  PETITS.forEach(p=>{schoolMap[p]=window._genSchool[p+'_'+i]});
  generateDayPerChild(d.date,schoolMap);
  n++;
});
// Only push NEW tasks
Object.keys(S.tasks).forEach(id=>{if(!beforeIds.has(id))psh(id,S.tasks[id])});
closeM();toast('✅ '+n+' jour(s) générés !');render()};
